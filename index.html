<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#f7f1e5">
  <title>ธนซิน การเกษตร</title>
  <link rel="stylesheet" href="landing.css">
</head>
<body>
  <main class="entry-page">
    <header class="brand-bar"><h1>ธนซิน การเกษตร</h1><i></i></header>
    <section class="hero">
      <p class="eyebrow"><span></span>SELECT YOUR EXPERIENCE<span></span></p>
      <h2>เลือกการเข้าใช้งาน</h2>
      <p class="lead">ค้นพบสินค้าคุณภาพ เพื่อผลผลิตที่ดีกว่า</p>
    </section>
    <section class="choice-list">
      <article class="choice customer">
        <div class="choice-body">
          <div class="icon-box customer-icon" aria-hidden="true"><i class="head"></i><i class="body"></i><i class="leaf"></i></div>
          <div class="copy"><h3>ลูกค้าทั่วไป</h3><p>ดูสินค้า ราคา รายละเอียด<br>โปรโมชั่น และของแถม</p></div>
        </div>
        <a class="action" href="products.html">เข้าสู่หน้าสินค้า <b>→</b></a>
      </article>
      <article class="choice admin">
        <div class="choice-body">
          <div class="icon-box admin-icon" aria-hidden="true"><i class="shield"></i><i class="panel">●</i><i class="sprig"></i></div>
          <div class="copy"><h3>ADMIN</h3><p>จัดการสินค้า หมวดหมู่<br>โปรโมชั่น และของแถม</p></div>
        </div>
        <a class="action" href="#" aria-label="เข้าสู่ระบบผู้ดูแล">เข้าสู่ระบบผู้ดูแล <b>→</b></a>
      </article>
    </section>
  </main>
</body>
</html>
